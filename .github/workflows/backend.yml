name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "owlclip_backend_new/**"

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./owlclip_backend_new
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/owlclip-backend:latest
            ghcr.io/${{ github.repository_owner }}/owlclip-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max