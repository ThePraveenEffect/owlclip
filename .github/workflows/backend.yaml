name: OwlClip Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "owlclip_backend_new/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./owlclip_backend_new
          push: true
          tags: |
            ghcr.io/pravweb/owlclip-backend:latest
            ghcr.io/pravweb/owlclip-backend:${{ github.sha }}

      - name: Deploy on VM (local)
        run: |
          export IMAGE_TAG=${{ github.sha }}
          cd /home/azureuser/owlclip
          ./deploy.sh
