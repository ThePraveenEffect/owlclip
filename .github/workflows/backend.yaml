name: OwlClip Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "owlclip_backend_new/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/pravweb/owlclip-backend:latest \
            -t ghcr.io/pravweb/owlclip-backend:${{ github.sha }} \
            ./owlclip_backend_new

      - name: Push image
        run: |
          docker push ghcr.io/pravweb/owlclip-backend:latest
          docker push ghcr.io/pravweb/owlclip-backend:${{ github.sha }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

          cd /home/azureuser/owlclip
          ./deploy.sh